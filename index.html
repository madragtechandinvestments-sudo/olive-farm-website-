<!DOCTYPE html>
<html>
<head>
  <title>Olive Grove Farms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Olive Grove Farms</h1>
  <p>Premium California Extra Virgin Olive Oil</p>
</header>

<section>
  <h2>About Our Farm</h2>
  <p>
    Olive Grove Farms is a family-owned olive farm dedicated to sustainable
    harvesting and premium-quality olive oil production.
  </p>
</section>

<section>
  <h2>Submit an Invoice</h2>

  <form action="https://formspree.io/f/xdalvbjj" method="POST" enctype="multipart/form-data">
    
    <label>Full Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Upload Invoice (PDF only)</label>
    <input type="file" name="attachment" accept=".pdf" required>

    <button type="submit">Send Invoice</button>

  </form>
</section>

<footer>
  <p>© 2026 Olive Grove Farms</p>
</footer>

</body>
</html>
